server:
  port: 9098

spring:

  application:
    name: SECURITY

  datasource:
    url: jdbc:mysql://localhost:3306/microservice
    username: root
    password: Root@1234

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka